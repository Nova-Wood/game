<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>明堂司历 - 岁时抽卡模拟器 V8.0</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: #1a1a1a; color: #eee; margin: 0; padding: 20px; }
        h1 { color: #8bc34a; transition: color 0.5s; text-align: center; }
        
        .controls { margin: 0 auto 20px; background: #2c2c2c; padding: 20px; border-radius: 10px; max-width: 800px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; }
        select { padding: 10px; font-size: 16px; margin-right: 15px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; outline: none; }
        button { padding: 10px 20px; font-size: 16px; margin: 0 5px; cursor: pointer; background-color: #4caf50; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #45a049; transform: scale(1.05); }
        .btn-wiki { background-color: #2196f3; }
        .btn-wiki:hover { background-color: #1976d2; }
        .btn-clear { background-color: #f44336; font-size: 12px; padding: 5px 10px; margin-top: 10px; }
        
        #pool-desc { margin-top: 15px; font-size: 14px; color: #bbb; }
        
        #game-layout { display: flex; max-width: 1300px; margin: 0 auto; gap: 20px; align-items: flex-start; }
        #main-content { flex: 3; background: #222; border-radius: 10px; padding: 20px; min-height: 600px; }
        #sidebar { flex: 1; background: #2c2c2c; border-radius: 10px; padding: 20px; border: 2px solid #555; position: sticky; top: 20px; text-align: center; transition: 0.1s; }
        
        /* 震动动画：用于答错时的惩罚反馈 */
        @keyframes shake {
            0% { transform: translateX(0); border-color: #f44336; }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); border-color: #555; }
        }
        .shake-effect { animation: shake 0.4s ease-in-out; border-color: #f44336 !important; background-color: #3a1c1c !important; }
        
        .score-board { font-size: 18px; color: #fff; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px dashed #555; line-height: 1.8; transition: 0.3s; }
        .score-val { color: #ffeb3b; font-weight: bold; font-size: 22px; transition: color 0.3s; }
        .rank-val { font-weight: bold; font-size: 24px; text-shadow: 0 0 10px rgba(255,255,255,0.2); transition: color 0.3s; }
        
        .question-box { background: #1a1a1a; padding: 15px; border-radius: 8px; border-left: 4px solid #8bc34a; font-size: 16px; line-height: 1.5; margin-bottom: 15px; text-align: left; }
        .qa-tip { font-size: 12px; color: #aaa; margin-bottom: 15px; }
        #qa-feedback { min-height: 40px; font-weight: bold; margin-top: 15px; font-size: 14px; text-align: left; padding: 10px; border-radius: 5px; display: none; }
        .feedback-success { background-color: rgba(76, 175, 80, 0.2); border-left: 4px solid #4caf50; color: #8bc34a; display: block !important; }
        .feedback-error { background-color: rgba(244, 67, 54, 0.2); border-left: 4px solid #f44336; color: #ff8a80; display: block !important; }

        .view-section { display: none; }
        .view-section.active { display: block; text-align: center; }
        
        .card-grid { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .card { width: 200px; background-color: #2c2c2c; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 2px solid #555; text-align: left; position: relative; overflow: hidden; margin: 10px; transition: 0.2s; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .card-type { font-size: 12px; color: #aaa; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .card-desc { font-size: 13px; margin-bottom: 10px; line-height: 1.4; color: #ddd; }
        .card-quote { font-size: 12px; color: #8bc34a; font-style: italic; }
        
        .wiki-card { transform: scale(0.95); cursor: pointer; }
        .wiki-card:hover { transform: scale(1); border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        .locked { filter: grayscale(100%); opacity: 0.5; border-color: #333 !important; cursor: not-allowed; }
        .locked:hover { transform: scale(0.95); box-shadow: none; }
        .locked-text { position: absolute; top: 50%; left: 0; right: 0; text-align: center; margin-top: -12px; font-size: 20px; color: #fff; font-weight: bold; pointer-events: none; }
        .count-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        
        .progress-container { width: 80%; margin: 20px auto; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #555; }
        .progress-bar { height: 15px; background: #4caf50; width: 0%; transition: width 0.5s; }
        .progress-text { margin-top: 5px; font-size: 14px; }

        .UR { border-color: #ff5722; background: #3a2311; }
        .SSR { border-color: #ffc107; }
        .SR { border-color: #9c27b0; }
        .R { border-color: #03a9f4; }
        .N { border-color: #9e9e9e; }
    </style>
</head>
<body>

    <h1 id="main-title">📜 明堂司历：岁时抽卡模拟器</h1>
    
    <div class="controls">
        <select id="pool-selector">
            <option value="spring">🌸 春之卷 (木·青·角音)</option>
            <option value="summer">☀️ 夏之卷 (火·赤·征音)</option>
            <option value="autumn">🍁 秋之卷 (金·白·商音)</option>
            <option value="winter">❄️ 冬之卷 (水·黑·羽音)</option>
        </select>
        <button id="btn-draw-1">观星 (单抽)</button>
        <button id="btn-draw-10">连观十星 (十连)</button>
        <button id="btn-show-wiki" class="btn-wiki">📖 藏书阁 (答题区)</button>
        <button id="btn-show-gacha" class="btn-wiki" style="background-color: #607d8b;">🌌 返回明堂</button>
        <div id="pool-desc">当前卡池：万物复苏，东方青气极盛。UP神明：太皞、句芒。</div>
    </div>

    <div id="game-layout">
        <div id="main-content">
            <div id="gacha-view" class="view-section active">
                <h2 style="color: #ccc; border-bottom: 1px solid #444; padding-bottom: 10px;">🌠 观星结果</h2>
                <div id="result-area" class="card-grid"></div>
            </div>

            <div id="wiki-view" class="view-section">
                <h2 style="color: #ccc;">📖 月令万物图鉴</h2>
                <div class="progress-text">收集进度：<span id="collection-count">0</span> / <span id="total-count">0</span></div>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div style="color: #8bc34a; font-size: 14px; margin-bottom: 10px;">💡 提示：在面临提问时，点击已点亮的卡牌即可提交答案！答错会降职哦！</div>
                <button id="btn-clear-save" class="btn-clear">⚠️ 清空游戏进度</button>
                <div id="wiki-area" class="card-grid"></div>
            </div>
        </div>

        <div id="sidebar">
            <h2 style="margin-top: 0; color: #ffeb3b;">🏛️ 天机阁</h2>
            <div class="score-board">
                官阶：<span id="rank-display" class="rank-val">布衣学童</span><br>
                灵力：<span id="score-display" class="score-val">0</span>
            </div>
            
            <div style="font-size: 14px; color: #ccc; text-align: left; margin-bottom: 5px;">来自天子的考校：</div>
            <div class="question-box" id="question-text">
                正在翻阅书简，准备考题...
            </div>
            
            <div class="qa-tip">👉 请前往 [藏书阁] 点击对应卡牌作答</div>
            <button id="btn-skip-question" style="font-size: 12px; padding: 5px 10px; background-color: #555;">换一道题</button>
            
            <div id="qa-feedback"></div>
        </div>
    </div>

    <script>
        var qaBank = [
            { q: "太史令，孟春之月，天子祭祀户神时，祭品中应以什么脏器为尊？", a: "祀户祭脾" },
            { q: "季冬之月，万物闭藏。天子会举行哪项盛大的年终祭祀，来合祭祖先与五祀神？", a: "腊先祖五祀" },
            { q: "秋季五行属金，其对应的音律和味道分别是什么？", a: "商音与辛味" },

            { q: "立冬之日，天子率领百官去往何处迎接冬气？", a: "迎冬于北郊" },
            { q: "仲秋之月，燕子感知到肃杀之气，开始向南方迁徙。这叫什么物候？", a: "玄鸟归" },
            { q: "季秋时节，天子教习武备，演练五种兵器。这是什么大典？", a: "教于田猎" },
            { q: "季春之月，后妃需要斋戒，并亲自向东方采摘桑叶，以劝勉蚕事。这叫什么大典？", a: "后妃躬桑" },
            { q: "仲冬之月，阴气极盛，阳气微动，哪一种猛兽开始交配？", a: "虎始交" },
            { q: "季夏之月，腐朽的草化作了夏夜的飞虫，这是什么物候？", a: "腐草为萤" },
            { q: "主宰中央的最高神明是黄帝，五行属土。那么对应他的天帝卡牌是？", a: "帝黄帝" },
            { q: "春天冬眠的虫子开始苏醒，标志着孟春的到来，这叫什么？", a: "蛰虫始振" }
        ];

        // 灾异题库（源自《礼记·月令》原文）
        var disasterBank = [
            "【春行夏令】雨水不时，草木蚤落，国时有恐。",
            "【春行秋令】其民大疫，猋风暴雨总至，藜莠蓬蒿并兴。",
            "【夏行冬令】草木蚤枯，后乃大水，败其城郭。",
            "【夏行春令】蝗虫为灾，暴风来格，秀草不实。",
            "【秋行冬令】阴气大胜，介虫败谷，戎兵乃来。",
            "【秋行夏令】国多火灾，寒热不节，民多疟疾。",
            "【冬行春令】冻闭不密，地气上泄，民多流亡。",
            "【冬行秋令】雪霜不时，小兵时起，土地侵削。"
        ];
