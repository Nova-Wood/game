                { name: "授几杖", rarity: "SSR", type: "仲秋大典", desc: "赡养衰老之人，赐予手杖。", quote: "养衰老，授几杖", weight: 5 },
                { name: "教于田猎", rarity: "SSR", type: "季秋大典", desc: "天子教习田猎，演练五种兵器。", quote: "教于田猎，以习五戎", weight: 5 },
                { name: "总章大庙", rarity: "SR", type: "天子居所", desc: "天子秋季居于明堂西堂。", quote: "天子居总章大庙", weight: 12 },
                { name: "乘戎路", rarity: "SR", type: "天子仪仗", desc: "秋季天子乘坐的马车，驾白骆。", quote: "乘戎路，驾白骆", weight: 12 },
                { name: "凉风至", rarity: "R", type: "孟秋物候", desc: "秋风送爽，白露开始降落。", quote: "凉风至，白露降", weight: 20 },
                { name: "玄鸟归", rarity: "R", type: "仲秋物候", desc: "燕子开始向南方迁徙归去。", quote: "玄鸟归", weight: 20 },
                { name: "鞠有黄华", rarity: "R", type: "季秋物候", desc: "菊花开出黄色的花朵。", quote: "鞠有黄华", weight: 20 },
                { name: "鹰乃祭鸟", rarity: "R", type: "孟秋物候", desc: "老鹰捕鸟后先陈列祭祀。", quote: "鹰乃祭鸟，用始行戮", weight: 20 },
                { name: "爵入大水为蛤", rarity: "R", type: "季秋物候", desc: "雀鸟潜入大水变成蛤蜊。", quote: "爵入大水为蛤", weight: 20 },
                { name: "商音与辛味", rarity: "N", type: "五行属性", desc: "秋季属金，对应商音与辛味（辣）。", quote: "其音商...其味辛", weight: 40 },
                { name: "祀门祭肝", rarity: "N", type: "祭祀制度", desc: "秋季祭门神，祭品以肝脏为尊。", quote: "其祀门，祭先肝", weight: 40 },
                { name: "食麻与犬", rarity: "N", type: "饮食制度", desc: "秋季天子适宜食用的食物。", quote: "食麻与犬", weight: 40 }
            ],
            winter: [
                { name: "帝颛顼", rarity: "UR", type: "冬季天帝", desc: "主宰北方与冬季的最高神明，五行属水。", quote: "其帝颛顼", weight: 1 },
                { name: "神玄冥", rarity: "UR", type: "冬季佐神", desc: "颛顼的辅佐神，掌管冬之闭藏。", quote: "其神玄冥", weight: 2 },
                { name: "迎冬于北郊", rarity: "SSR", type: "国家大典", desc: "立冬之日，天子率百官迎冬气。", quote: "迎冬于北郊", weight: 5 },
                { name: "恤孤寡", rarity: "SSR", type: "国家大典", desc: "赏赐为国牺牲者，抚恤孤儿寡母。", quote: "赏死事，恤孤寡", weight: 5 },
                { name: "腊先祖五祀", rarity: "SSR", type: "季冬大典", desc: "年终大祭，合祭祖先与五祀神。", quote: "腊先祖五祀", weight: 5 },
                { name: "审棺椁", rarity: "SSR", type: "国家大典", desc: "审查丧葬的厚薄规格。", quote: "审棺椁之薄厚", weight: 5 },
                { name: "玄堂大庙", rarity: "SR", type: "天子居所", desc: "天子冬季居于明堂北堂（玄堂）。", quote: "天子居玄堂大庙", weight: 12 },
                { name: "乘玄路", rarity: "SR", type: "天子仪仗", desc: "冬季天子乘坐的马车，驾铁骊。", quote: "乘玄路，驾铁骊", weight: 12 },
                { name: "水始冰", rarity: "R", type: "孟冬物候", desc: "水面开始结冰，大地冻结。", quote: "水始冰，地始冻", weight: 20 },
                { name: "虎始交", rarity: "R", type: "仲冬物候", desc: "阴气极盛，阳气微动，老虎开始交配。", quote: "虎始交", weight: 20 },
                { name: "雁北乡", rarity: "R", type: "季冬物候", desc: "大雁感知到阳气，开始向北飞。", quote: "雁北乡", weight: 20 },
                { name: "虹藏不见", rarity: "R", type: "孟冬物候", desc: "彩虹隐藏不再出现。", quote: "虹藏不见", weight: 20 },
                { name: "羽音与咸味", rarity: "N", type: "五行属性", desc: "冬季属水，对应羽音与咸味。", quote: "其音羽...其味咸", weight: 40 },
                { name: "祀行祭肾", rarity: "N", type: "祭祀制度", desc: "冬季祭行神（道路），祭品以肾脏为尊。", quote: "其祀行，祭先肾", weight: 40 },
                { name: "食黍与彘", rarity: "N", type: "饮食制度", desc: "冬季天子适宜食用的食物。", quote: "食黍与彘", weight: 40 }
            ]
        };

        var allUniqueCards = [];
        var cardNames = {}; 
        for (var season in gachaPools) {
            var pool = gachaPools[season];
            for (var i = 0; i < pool.length; i++) {
                var card = pool[i];
                if (!cardNames[card.name]) {
                    allUniqueCards.push(card);
                    cardNames[card.name] = true;
                }
            }
        }
        
        var rarityOrder = { "UR": 1, "SSR": 2, "SR": 3, "R": 4, "N": 5 };
        allUniqueCards.sort(function(a, b) {
            return rarityOrder[a.rarity] - rarityOrder[b.rarity];
        });

        // 核心运行变量
        var inventory = { score: 0 };
        var currentQuestion = null;
        var feedbackTimeout = null;

        // 更新界面与官衔
        function updateRankDisplay() {
            var score = inventory.score || 0;
            var rankName = "布衣学童";
            var rankColor = "#9e9e9e";

            if (score >= 1000) { rankName = "大宗伯"; rankColor = "#ff5722"; }
            else if (score >= 600) { rankName = "太史令"; rankColor = "#ffc107"; }
            else if (score >= 300) { rankName = "太史丞"; rankColor = "#9c27b0"; }
            else if (score >= 100) { rankName = "司历官"; rankColor = "#03a9f4"; }
            else if (score >= 50)  { rankName = "灵台郎"; rankColor = "#8bc34a"; }

            var rankEl = document.getElementById('rank-display');
            var oldRank = rankEl.innerText;
            
            rankEl.innerText = rankName;
            rankEl.style.color = rankColor;
            
            if (oldRank !== "布衣学童" && oldRank !== rankName && score < getScoreThreshold(oldRank)) {
                setTimeout(function() { alert("📉 警告！由于你频出纰漏，官职已被贬为【" + rankName + "】！"); }, 300);
            }
            document.getElementById('score-display').innerText = score;
        }

        function getScoreThreshold(rank) {
            if (rank === "大宗伯") return 1000;
            if (rank === "太史令") return 600;
            if (rank === "太史丞") return 300;
            if (rank === "司历官") return 100;
            if (rank === "灵台郎") return 50;
            return 0;
        }

        function loadInventory() {
            try {
                var savedData = localStorage.getItem('mingtang_inventory');
                if (savedData) { 
                    var parsed = JSON.parse(savedData);
                    if (parsed) inventory = parsed; 
                }
            } catch (e) {
                // 静默失败，防卡死
            }
            if (typeof inventory.score === 'undefined') { inventory.score = 0; }
            updateRankDisplay();
        }

        function saveInventory() {
            try {
                localStorage.setItem('mingtang_inventory', JSON.stringify(inventory));
            } catch (e) {
                // 静默失败，防卡死
            }
            updateRankDisplay();
        }

        function generateNewQuestion() {
            var randIndex = Math.floor(Math.random() * qaBank.length);
            currentQuestion = qaBank[randIndex];
            document.getElementById('question-text').innerText = currentQuestion.q;
            document.getElementById('qa-feedback').className = ""; 
        }

        function triggerPunishmentShake() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('shake-effect');
            void sidebar.offsetWidth; 
            sidebar.classList.add('shake-effect');
            setTimeout(function() { sidebar.classList.remove('shake-effect'); }, 400);
        }

        function showFeedbackHTML(htmlContent, isSuccess) {
            var fbDiv = document.getElementById('qa-feedback');
            fbDiv.innerHTML = htmlContent;
            fbDiv.className = isSuccess ? 'feedback-success' : 'feedback-error';
            
            clearTimeout(feedbackTimeout);
            var displayTime = isSuccess ? 1500 : 4000;
            feedbackTimeout = setTimeout(function() { fbDiv.className = ""; }, displayTime);
        }

        // 处理卡牌点击 (修复渲染性能)
        function handleCardClick(cardName) {
            if (document.getElementById('wiki-view').style.display !== 'block') return;
            
            var count = inventory[cardName] || 0;
            if (count === 0) {
                showFeedbackHTML("❌ 此卡牌尚未解锁，无法提交！请先去明堂观星。", false);
                return;
            }

            if (!currentQuestion) return;

            if (cardName === currentQuestion.a) {
                inventory.score += 20;
                saveInventory();
                showFeedbackHTML("✅ 回答正确！灵力 +20", true);
                
                if ([50, 100, 300, 600, 1000].indexOf(inventory.score) !== -1) {
                    setTimeout(function() { alert("🎉 恭喜！你的官职获得了晋升！"); }, 500);
                }
                setTimeout(generateNewQuestion, 1500);
            } else {
                inventory.score = Math.max(0, inventory.score - 10); 
                saveInventory();
                triggerPunishmentShake();
                
                var randomDisaster = disasterBank[Math.floor(Math.random() * disasterBank.length)];
                var errorMsg = "<b>❌ 逆天时之罚：扣除 10 点灵力！</b><br><br><span style='font-size: 13px; color: #ffab91;'>📜 天地异象：" + randomDisaster + "</span>";
                
                showFeedbackHTML(errorMsg, false);
            }
        }

        function updateTheme() {
            var selector = document.getElementById('pool-selector');
            var desc = document.getElementById('pool-desc');
            var h1 = document.getElementById('main-title');
            var val = selector.value;
            
            if (val === 'spring') {
                desc.innerText = "🌸 当前卡池：万物复苏，东方青气极盛。UP神明：太皞、句芒。";
                h1.style.color = "#8bc34a";
            } else if (val === 'summer') {
                desc.innerText = "☀️ 当前卡池：盛德在火，南方赤气极盛。包含【中央土】。UP神明：炎帝、黄帝。";
                h1.style.color = "#ff5722";
            } else if (val === 'autumn') {
                desc.innerText = "🍁 当前卡池：天气肃杀，西方白气极盛。UP神明：少皞、蓐收。";
                h1.style.color = "#fff";
            } else if (val === 'winter') {
                desc.innerText = "❄️ 当前卡池：万物闭藏，北方黑气极盛。UP神明：颛顼、玄冥。";
                h1.style.color = "#03a9f4";
            }
        }

        function toggleView(viewId) {
            document.getElementById('gacha-view').style.display = 'none';
            document.getElementById('wiki-view').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
            if(viewId === 'wiki-view') { renderWiki(); }
        }

        function getRandomCard(poolName) {
            var pool = gachaPools[poolName];
            var totalWeight = 0;
            for (var i = 0; i < pool.length; i++) { totalWeight += pool[i].weight; }
            var randomNum = Math.random() * totalWeight;
            var weightSum = 0;
            for (var j = 0; j < pool.length; j++) {
                weightSum += pool[j].weight;
                if (randomNum <= weightSum) return pool[j];
            }
            return pool[0]; 
        }

        function generateCardHTML(card, isWiki) {
            var count = inventory[card.name] || 0;
            var isLocked = isWiki && count === 0;
            var html = '<div class="card ' + card.rarity + ' ';
            
            if (isWiki) {
                html += 'wiki-card ';
                if (isLocked) html += 'locked ';
            }
            html += '" ';
            
            if (isWiki) { html += 'onclick="handleCardClick(\'' + card.name + '\')"'; }
            html += '>';
            
            if (isWiki && count > 0) { html += '<div class="count-badge">已收集: ' + count + '</div>'; }
            if (isWiki && count === 0) { html += '<div class="locked-text">🔒 未解锁</div>'; }
            
            html += '<div class="card-title">[' + card.rarity + '] ' + card.name + '</div>';
            html += '<div class="card-type">🏷️ ' + card.type + '</div>';
            html += '<div class="card-desc">' + card.desc + '</div>';
            html += '<div class="card-quote">📜 "' + card.quote + '"</div>';
            html += '</div>';
            return html;
        }

        // 优化DOM渲染，解决连续抽卡和加载时的卡顿
        function draw(times) {
            toggleView('gacha-view');
            var resultArea = document.getElementById('result-area');
            var poolName = document.getElementById('pool-selector').value;
            
            var htmlContent = "";
            for (var i = 0; i < times; i++) {
                var card = getRandomCard(poolName);
                if (!inventory[card.name]) { inventory[card.name] = 0; }
                inventory[card.name]++;
                htmlContent += generateCardHTML(card, false);
            }
            resultArea.innerHTML = htmlContent; 
            saveInventory();
        }

        function renderWiki() {
            var wikiArea = document.getElementById('wiki-area');
            var unlockedCount = 0;
            var htmlContent = "";

            for (var i = 0; i < allUniqueCards.length; i++) {
                var card = allUniqueCards[i];
                htmlContent += generateCardHTML(card, true);
                if (inventory[card.name]) { unlockedCount++; }
            }
            wikiArea.innerHTML = htmlContent;

            var totalCount = allUniqueCards.length;
            document.getElementById('total-count').innerText = totalCount;
            document.getElementById('collection-count').innerText = unlockedCount;
            
            var percentage = (unlockedCount / totalCount) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }

        window.onload = function() {
            loadInventory();
            updateTheme();
            renderWiki();
            generateNewQuestion();
            
            document.getElementById('pool-selector').onchange = updateTheme;
            document.getElementById('btn-draw-1').onclick = function() { draw(1); };
            document.getElementById('btn-draw-10').onclick = function() { draw(10); };
            document.getElementById('btn-show-wiki').onclick = function() { toggleView('wiki-view'); };
            document.getElementById('btn-show-gacha').onclick = function() { toggleView('gacha-view'); };
            document.getElementById('btn-skip-question').onclick = generateNewQuestion;
            document.getElementById('btn-clear-save').onclick = function() {
                if(confirm("确定要清空所有的收集进度和灵力吗？这无法撤销！")) {
                    try { localStorage.removeItem('mingtang_inventory'); } catch (e) {}
                    inventory = { score: 0 };
                    renderWiki();
                    updateRankDisplay();
                    alert("已清空进度，重新开始修行。");
                }
            };
        };
    </script>
